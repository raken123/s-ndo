<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="msapplication-tap-highlight" content="no">
<meta name="theme-color" content="#0d0f1e">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src *; img-src 'self' data:;">
<title>Mattenite</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="default">

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">M</div>
    <div class="brand-txt">
      <h1>Mattenite</h1>
      <span>Svara. Kasta. Överlev.</span>
    </div>
  </div>
  <span class="chip coins" id="chip-coins">🪙 0</span>
  <span class="chip lvl" id="chip-level">⭐ Nivå 1</span>
</header>

<main>
  <section class="view active" id="view-home"></section>
  <section class="view" id="view-lobbies"></section>
  <section class="view" id="view-play"></section>
  <section class="view" id="view-game"></section>
  <section class="view" id="view-ach"></section>
  <section class="view" id="view-profile"></section>
</main>

<nav class="tabbar">
  <button data-tab="home" class="on"><span class="ic">🏠</span><span class="lb">Hem</span></button>
  <button data-tab="lobbies"><span class="ic">🚪</span><span class="lb">Lobbies</span></button>
  <button data-tab="play"><span class="ic">🎮</span><span class="lb">Spela</span></button>
  <button data-tab="ach"><span class="ic">🏆</span><span class="lb">Prestationer</span><span class="dot" id="ach-dot"></span></button>
  <button data-tab="profile"><span class="ic">👤</span><span class="lb">Profil</span></button>
</nav>

<div class="toast-wrap" id="toasts"></div>
<div class="confetti" id="confetti"></div>
<div class="modal" id="modal"><div class="modal-box" id="modal-box"></div></div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
<script src="js/app.js"></script>
</body>
</html>
