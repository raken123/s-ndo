<script>
/* ==========================================================================
   state.js — profil, sparning, XP/nivåer, statistik och prestationsmotor
   ========================================================================== */
(function (M) {
  'use strict';

  var KEY = 'mattenite.profile.v1';

  var DEFAULT_STATS = {
    gamesPlayed: 0, wins: 0, answers: 0, correct: 0, wrong: 0,
    bestStreak: 0, winStreak: 0, bestWinStreak: 0,
    throws: 0, booms: 0, knockouts: 0, clutchThrows: 0,
    perfectGames: 0, fullLifeWins: 0, comebacks: 0, pureWins: 0,
    hardWins: 0, extremeWins: 0, bigLobbyWins: 0, duelWins: 0,
    fastAnswers3: 0, fastAnswers15: 0, fastestMs: 0,
    blitzBest: 0, survivalBest: 0, practiceAnswers: 0,
    powerupsUsed: 0, shieldBlocks: 0,
    lobbiesJoined: 0, lobbiesCreated: 0, chatSent: 0,
    coinsEarned: 0, purchases: 0,
    dailyDone: 0, dailyPerfect: 0, dailyStreak: 0, bestDailyStreak: 0,
    minutesPlayed: 0, secondsPlayed: 0,
    nightGames: 0, morningGames: 0, answer42: 0, tripleBoom: 0, pacifist: 0
  };

  M.CATEGORIES.forEach(function (c) { DEFAULT_STATS['cat_' + c.id] = 0; });

  function defaults() {
    return {
      v: 1,
      name: 'Du',
      avatar: '🦊',
      theme: 'default',
      bomb: '💣',
      coins: 60,
      xp: 0,
      level: 1,
      owned: ['bo_bomb'],
      settings: { sound: true, vibrate: true, anim: true },
      stats: JSON.parse(JSON.stringify(DEFAULT_STATS)),
      unlocked: {},
      daily: { date: '', score: 0, best: 0, streak: 0 },
      history: [],
      createdAt: Date.now()
    };
  }

  var profile = defaults();
  M.profile = profile;

  M.load = function () {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) {
        var saved = JSON.parse(raw);
        var base = defaults();
        Object.keys(base).forEach(function (k) {
          if (saved[k] === undefined) saved[k] = base[k];
        });
        Object.keys(DEFAULT_STATS).forEach(function (k) {
          if (typeof saved.stats[k] !== 'number') saved.stats[k] = DEFAULT_STATS[k];
        });
        Object.keys(base.settings).forEach(function (k) {
          if (saved.settings[k] === undefined) saved.settings[k] = base.settings[k];
        });
        profile = saved;
      }
    } catch (e) { /* korrupt data — börja om */ }
    M.profile = profile;
    return profile;
  };

  M.save = function () {
    try { localStorage.setItem(KEY, JSON.stringify(profile)); } catch (e) { /* full disk */ }
  };

  M.reset = function () {
    profile = defaults();
    M.profile = profile;
    M.save();
  };

  /* ---------- XP & nivåer -------------------------------------------------- */

  M.xpForLevel = function (lvl) { return 90 + (lvl - 1) * 55; };

  M.addXp = function (amount) {
    if (amount <= 0) return { levels: 0 };
    profile.xp += amount;
    var levels = 0;
    while (profile.xp >= M.xpForLevel(profile.level)) {
      profile.xp -= M.xpForLevel(profile.level);
      profile.level++;
      levels++;
      M.addCoins(25 + profile.level * 5, true);
    }
    return { levels: levels };
  };

  M.addCoins = function (n, silent) {
    if (n <= 0) return;
    profile.coins += n;
    profile.stats.coinsEarned += n;
    if (!silent && M.ui) M.ui.coinFlash();
  };

  /* ---------- Statistik ---------------------------------------------------- */

  M.bump = function (key, by) {
    if (typeof profile.stats[key] !== 'number') profile.stats[key] = 0;
    profile.stats[key] += (by === undefined ? 1 : by);
  };

  M.setMax = function (key, val) {
    if (typeof profile.stats[key] !== 'number') profile.stats[key] = 0;
    if (val > profile.stats[key]) profile.stats[key] = val;
  };

  M.accuracy = function () {
    var s = profile.stats;
    if (!s.answers) return 0;
    return Math.round(s.correct / s.answers * 100);
  };

  /* ---------- Prestationer -------------------------------------------------- */

  function statValue(key) {
    var s = profile.stats;
    if (key === 'level') return profile.level;
    if (key === 'achUnlocked') return Object.keys(profile.unlocked).length;
    if (key === 'themesOwned') {
      return M.SHOP.filter(function (it) {
        return it.type === 'theme' && profile.owned.indexOf(it.id) >= 0;
      }).length;
    }
    if (key === 'allCats10') {
      return M.CATEGORIES.every(function (c) { return s['cat_' + c.id] >= 10; }) ? 1 : 0;
    }
    if (key === 'minutesPlayed') return Math.floor(s.secondsPlayed / 60);
    return s[key] || 0;
  }
  M.statValue = statValue;

  M.achProgress = function (a) {
    var v = statValue(a.stat);
    return { value: Math.min(v, a.goal), goal: a.goal, done: !!profile.unlocked[a.id], pct: Math.min(100, Math.round(v / a.goal * 100)) };
  };

  /* Kollar alla prestationer, låser upp nya och returnerar dem. */
  M.checkAchievements = function () {
    var fresh = [];
    for (var pass = 0; pass < 2; pass++) {
      M.ACHIEVEMENTS.forEach(function (a) {
        if (profile.unlocked[a.id]) return;
        if (statValue(a.stat) >= a.goal) {
          profile.unlocked[a.id] = Date.now();
          profile.coins += a.c;
          profile.stats.coinsEarned += a.c;
          fresh.push(a);
        }
      });
      // andra varvet fångar prestationer som utlöses av antalet upplåsta
    }
    if (fresh.length) M.save();
    return fresh;
  };

  M.unlockedCount = function () { return Object.keys(profile.unlocked).length; };

  M.achPoints = function () {
    var pts = { vanlig: 5, ovanlig: 10, sallsynt: 20, episk: 40, legendarisk: 80, hemlig: 50 };
    return M.ACHIEVEMENTS.reduce(function (sum, a) {
      return sum + (profile.unlocked[a.id] ? (pts[a.r] || 5) : 0);
    }, 0);
  };

  /* ---------- Historik ------------------------------------------------------ */

  M.pushHistory = function (entry) {
    entry.at = Date.now();
    profile.history.unshift(entry);
    if (profile.history.length > 40) profile.history.length = 40;
  };

  /* ---------- Dagens utmaning ----------------------------------------------- */

  M.todayKey = function () {
    var d = new Date();
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
  };

  M.dailyDoneToday = function () { return profile.daily.date === M.todayKey(); };

  /* Deterministisk slump så att dagens frågor blir samma för alla. */
  M.seededRandom = function (seedStr) {
    var h = 2166136261;
    for (var i = 0; i < seedStr.length; i++) {
      h ^= seedStr.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return function () {
      h += 0x6D2B79F5;
      var t = h;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  };

  /* ---------- Ägande -------------------------------------------------------- */

  M.owns = function (id) { return profile.owned.indexOf(id) >= 0; };

  M.buy = function (id) {
    var item = null;
    M.SHOP.forEach(function (it) { if (it.id === id) item = it; });
    if (!item || M.owns(id) || profile.coins < item.cost) return false;
    profile.coins -= item.cost;
    profile.owned.push(id);
    M.bump('purchases');
    M.save();
    return true;
  };

})(window.MATTENITE = window.MATTENITE || {});

</script>
<script>
/* ==========================================================================
   ui.js — navigering, vyer, ljud, toasts, butik, lobbylistan
   ========================================================================== */
(function (M) {
  'use strict';

  var ui = {};
  M.ui = ui;

  var $ = function (sel, root) { return (root || document).querySelector(sel); };
  var $$ = function (sel, root) { return Array.prototype.slice.call((root || document).querySelectorAll(sel)); };
  ui.$ = $; ui.$$ = $$;

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  ui.esc = esc;

  /* ---------- Ljud & vibration --------------------------------------------- */

  var actx = null;
  function audio() {
    if (!M.profile.settings.sound) return null;
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      if (actx.state === 'suspended') actx.resume();
      return actx;
    } catch (e) { return null; }
  }

  function tone(freq, dur, type, vol, delay) {
    var ctx = audio();
    if (!ctx) return;
    var t0 = ctx.currentTime + (delay || 0);
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol || 0.16, t0 + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  ui.sfx = {
    right: function () { tone(660, .1, 'triangle'); tone(990, .16, 'triangle', .14, .07); },
    wrong: function () { tone(180, .22, 'sawtooth', .12); },
    throwIt: function () { tone(520, .07, 'square', .1); tone(300, .1, 'square', .09, .06); },
    tick: function () { tone(1200, .03, 'square', .05); },
    boom: function () { tone(90, .45, 'sawtooth', .2); tone(60, .5, 'square', .14, .04); },
    win: function () { [523, 659, 784, 1047].forEach(function (f, i) { tone(f, .22, 'triangle', .15, i * .11); }); },
    lose: function () { [400, 330, 260, 190].forEach(function (f, i) { tone(f, .2, 'sine', .13, i * .1); }); },
    unlock: function () { [784, 988, 1319].forEach(function (f, i) { tone(f, .2, 'sine', .13, i * .09); }); },
    coin: function () { tone(1050, .07, 'square', .09); tone(1400, .09, 'square', .08, .05); }
  };

  ui.buzz = function (ms) {
    if (!M.profile.settings.vibrate) return;
    if (navigator.vibrate) { try { navigator.vibrate(ms || 30); } catch (e) {} }
  };

  /* ---------- Toasts, modal, konfetti -------------------------------------- */

  ui.toast = function (icon, title, sub, ms) {
    var wrap = $('#toasts');
    var el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = '<span class="ic">' + icon + '</span><div><div>' + esc(title) + '</div>' +
      (sub ? '<small>' + esc(sub) + '</small>' : '') + '</div>';
    wrap.appendChild(el);
    setTimeout(function () {
      el.style.transition = 'opacity .3s, transform .3s';
      el.style.opacity = '0';
      el.style.transform = 'translateY(-10px)';
      setTimeout(function () { el.remove(); }, 320);
    }, ms || 2600);
  };

  ui.achToast = function (list) {
    list.forEach(function (a, i) {
      setTimeout(function () {
        ui.sfx.unlock();
        ui.buzz([25, 40, 25]);
        ui.toast(a.i, 'Prestation upplåst: ' + a.n, a.d + '  +' + a.c + ' mynt', 3400);
        ui.refreshChips();
        ui.markAchDot(true);
      }, i * 700);
    });
  };

  ui.modal = function (html, onOpen) {
    var box = $('#modal-box');
    box.innerHTML = html;
    $('#modal').classList.add('open');
    if (onOpen) onOpen(box);
  };
  ui.closeModal = function () { $('#modal').classList.remove('open'); };

  ui.confetti = function (n) {
    if (!M.profile.settings.anim) return;
    var wrap = $('#confetti');
    var colors = ['#7c5cff', '#00e5c8', '#ffc73a', '#ff4d6d', '#3ddc84'];
    for (var i = 0; i < (n || 60); i++) {
      var p = document.createElement('i');
      p.style.left = Math.random() * 100 + '%';
      p.style.top = '-20px';
      p.style.background = colors[i % colors.length];
      p.style.animationDuration = (1.1 + Math.random() * 1.3) + 's';
      p.style.animationDelay = (Math.random() * .4) + 's';
      wrap.appendChild(p);
      (function (el) { setTimeout(function () { el.remove(); }, 3000); })(p);
    }
  };

  ui.coinFlash = function () { ui.sfx.coin(); ui.refreshChips(); };

  /* ---------- Navigering ---------------------------------------------------- */

  ui.current = 'home';

  ui.show = function (name) {
    if (M.game && M.game.running && name !== 'game') {
      if (!confirm('Lämna matchen?')) return;
      M.game.abort();
    }
    ui.current = name;
    $$('.view').forEach(function (v) { v.classList.toggle('active', v.id === 'view-' + name); });
    $$('.tabbar button').forEach(function (b) { b.classList.toggle('on', b.dataset.tab === name); });
    document.querySelector('main').scrollTop = 0;
    if (name === 'home') ui.renderHome();
    if (name === 'lobbies') ui.renderLobbies();
    if (name === 'play') ui.renderPlay();
    if (name === 'ach') { ui.renderAch(); ui.markAchDot(false); }
    if (name === 'profile') ui.renderProfile();
    ui.refreshChips();
  };

  ui.markAchDot = function (on) { $('#ach-dot').classList.toggle('show', !!on); };

  ui.refreshChips = function () {
    var p = M.profile;
    $('#chip-coins').textContent = '🪙 ' + p.coins;
    $('#chip-level').textContent = '⭐ Nivå ' + p.level;
    document.body.dataset.theme = p.theme;
    document.body.classList.toggle('no-anim', !p.settings.anim);
  };

  /* ---------- Hem ----------------------------------------------------------- */

  ui.renderHome = function () {
    var p = M.profile, s = p.stats;
    var need = M.xpForLevel(p.level);
    var pct = Math.min(100, Math.round(p.xp / need * 100));
    var dailyDone = M.dailyDoneToday();

    $('#view-home').innerHTML =
      '<div class="hero">' +
        '<span class="bomb-deco">' + p.bomb + '</span>' +
        '<h2>Hej ' + esc(p.name) + ' ' + p.avatar + '</h2>' +
        '<p>Svara rätt. Kasta bomben vidare. Var inte den som håller i den när den smäller.</p>' +
        '<div class="row" style="gap:8px"><b style="font-size:13px">Nivå ' + p.level + '</b>' +
          '<span class="sub" style="margin-left:auto">' + p.xp + ' / ' + need + ' XP</span></div>' +
        '<div class="xpbar mt" style="margin-top:6px"><i style="width:' + pct + '%"></i></div>' +
        '<div class="row mt" style="gap:8px">' +
          '<button class="btn" data-act="quick">💣 Snabbmatch</button>' +
          '<button class="btn ghost" data-act="lobbies">🚪 Lobbies</button>' +
        '</div>' +
      '</div>' +

      '<div class="card" style="' + (dailyDone ? 'opacity:.85' : '') + '">' +
        '<h3>📅 Dagens utmaning</h3>' +
        '<p class="sub">10 frågor, samma för alla i hela världen. Svit: ' + p.daily.streak + ' dagar 🔥</p>' +
        (dailyDone
          ? '<div class="row mt between"><b>Klart idag — ' + p.daily.score + '/10</b><button class="btn ghost small" data-act="daily">Spela igen</button></div>'
          : '<button class="btn block mt" data-act="daily">Starta dagens utmaning</button>') +
      '</div>' +

      '<div class="grid grid-3">' +
        tile(s.wins, 'Segrar') + tile(s.gamesPlayed, 'Matcher') + tile(M.accuracy() + '%', 'Träffsäkerhet') +
        tile(s.bestStreak, 'Bästa svit') + tile(M.unlockedCount() + '/' + M.ACHIEVEMENTS.length, 'Prestationer') + tile(s.correct, 'Rätta svar') +
      '</div>' +

      '<div class="card mt"><h3>🕘 Senaste matcherna</h3>' +
        (p.history.length
          ? p.history.slice(0, 6).map(function (h) {
              return '<div class="row between" style="padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">' +
                '<span>' + (M.MODES[h.mode] ? M.MODES[h.mode].icon + ' ' + M.MODES[h.mode].name : h.mode) + '</span>' +
                '<span style="color:' + (h.win ? 'var(--ok)' : 'var(--muted)') + ';font-weight:700">' + esc(h.result) + '</span></div>';
            }).join('')
          : '<div class="empty"><span class="big">🫥</span>Inga matcher än. Kör en snabbmatch!</div>') +
      '</div>';

    $$('#view-home [data-act]').forEach(function (b) {
      b.onclick = function () {
        var a = b.dataset.act;
        if (a === 'quick') M.game.start({ mode: 'potato', diff: 2, cat: 'mix', bots: 3, lobbyName: 'Snabbmatch' });
        if (a === 'lobbies') ui.show('lobbies');
        if (a === 'daily') M.game.start({ mode: 'daily', diff: 2, cat: 'mix', bots: 0, lobbyName: 'Dagens utmaning' });
      };
    });
  };

  function tile(num, lbl) {
    return '<div class="stat-tile"><div class="num">' + num + '</div><div class="lbl">' + lbl + '</div></div>';
  }

  /* ---------- Lobbies ------------------------------------------------------- */

  var lobbies = [];
  var currentLobby = null;
  ui.getLobby = function () { return currentLobby; };

  function makeCode() {
    var s = '', c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    for (var i = 0; i < 5; i++) s += c[Math.floor(Math.random() * c.length)];
    return s;
  }

  function buildLobbies() {
    lobbies = M.LOBBY_TEMPLATES.map(function (t, i) {
      var players = M.rnd(1, t.max - 1);
      return {
        id: 'lb' + i, name: t.name, flag: t.flag, diff: t.diff, cat: t.cat,
        mode: t.mode, max: t.max, players: players, code: makeCode(),
        host: M.pick(M.BOT_NAMES), ping: M.rnd(12, 90), live: Math.random() < .35
      };
    });
  }
  buildLobbies();

  ui.renderLobbies = function () {
    if (currentLobby) return ui.renderRoom();
    var filter = ui.lobbyFilter || 'alla';
    var list = lobbies.filter(function (l) {
      if (filter === 'alla') return true;
      if (filter === 'ledig') return l.players < l.max;
      return String(l.diff) === filter;
    });

    $('#view-lobbies').innerHTML =
      '<div class="view-head"><h2>Lobbies</h2><p>Välj en lobby och tryck för att gå med. Bomben väntar inte.</p></div>' +
      '<div class="row" style="gap:8px;margin-bottom:12px">' +
        '<button class="btn" style="flex:1" data-act="create">➕ Skapa lobby</button>' +
        '<button class="btn ghost" data-act="code">🔑 Kod</button>' +
        '<button class="btn ghost" data-act="refresh">🔄</button>' +
      '</div>' +
      '<div class="ach-filter">' +
        ['alla', 'ledig', '1', '2', '3', '4'].map(function (f) {
          var lbl = f === 'alla' ? 'Alla' : f === 'ledig' ? 'Lediga platser' : M.DIFFS[+f - 1].name;
          return '<button data-f="' + f + '" class="' + (filter === f ? 'on' : '') + '">' + lbl + '</button>';
        }).join('') +
      '</div>' +
      (list.length ? list.map(lobbyRow).join('') : '<div class="empty"><span class="big">🕸️</span>Inga lobbyer matchar filtret.</div>');

    $$('#view-lobbies [data-f]').forEach(function (b) {
      b.onclick = function () { ui.lobbyFilter = b.dataset.f; ui.renderLobbies(); };
    });
    $$('#view-lobbies [data-lobby]').forEach(function (el) {
      el.onclick = function () { joinLobby(el.dataset.lobby); };
    });
    $$('#view-lobbies [data-act]').forEach(function (b) {
      b.onclick = function () {
        if (b.dataset.act === 'create') createLobbyDialog();
        if (b.dataset.act === 'refresh') { buildLobbies(); ui.renderLobbies(); ui.toast('🔄', 'Listan uppdaterad'); }
        if (b.dataset.act === 'code') codeDialog();
      };
    });
  };

  function lobbyRow(l) {
    var full = l.players >= l.max;
    return '<div class="lobby-item ' + (full ? 'full' : '') + '" data-lobby="' + l.id + '">' +
      '<span class="flag">' + l.flag + '</span>' +
      '<div class="meta"><b>' + esc(l.name) + ' ' +
        '<span class="pill d' + l.diff + '">' + M.DIFFS[l.diff - 1].name + '</span>' +
        (l.live ? '<span class="pill live">● pågår</span>' : '') + '</b>' +
        '<small>' + M.MODES[l.mode].icon + ' ' + M.MODES[l.mode].name + ' · ' + M.catName(l.cat) + ' · värd ' + esc(l.host) + ' · ' + l.ping + ' ms</small></div>' +
      '<div class="cnt">' + l.players + '/' + l.max + '<small>' + (full ? 'full' : 'gå med') + '</small></div>' +
    '</div>';
  }

  function joinLobby(id) {
    var l = null;
    lobbies.forEach(function (x) { if (x.id === id) l = x; });
    if (!l) return;
    if (l.players >= l.max) { ui.toast('🚫', 'Lobbyn är full', 'Prova en annan eller skapa en egen.'); return; }
    enterRoom(l, false);
  }

  function enterRoom(l, isHost) {
    currentLobby = {
      base: l, isHost: isHost, code: l.code, chat: [], countdown: 0,
      players: [{ id: 'you', name: M.profile.name, av: M.profile.avatar, you: true, ready: isHost, host: isHost, skill: 1 }]
    };
    var n = Math.max(1, l.players);
    for (var i = 0; i < n; i++) addBotToRoom();
    if (!isHost) currentLobby.players[1].host = true;
    M.bump('lobbiesJoined');
    if (isHost) M.bump('lobbiesCreated');
    M.save();
    ui.achToast(M.checkAchievements());
    pushChat(null, 'Du gick med i lobbyn.');
    ui.renderRoom();
    startRoomLoop();
  }

  function addBotToRoom() {
    var r = currentLobby;
    if (!r || r.players.length >= r.base.max) return null;
    var used = r.players.map(function (p) { return p.name; });
    var name = M.pick(M.BOT_NAMES.filter(function (n) { return used.indexOf(n) < 0; }) || M.BOT_NAMES);
    if (!name) return null;
    var bot = {
      id: 'b' + Math.random().toString(36).slice(2, 7),
      name: name, av: M.pick(M.AVATARS), you: false,
      ready: Math.random() < .5, host: false,
      skill: 0.55 + Math.random() * 0.4
    };
    r.players.push(bot);
    return bot;
  }

  var roomTimer = null;
  function startRoomLoop() {
    clearInterval(roomTimer);
    roomTimer = setInterval(function () {
      var r = currentLobby;
      if (!r) { clearInterval(roomTimer); return; }
      if (Math.random() < .35 && r.players.length < r.base.max) {
        var b = addBotToRoom();
        if (b) pushChat(null, b.name + ' gick med.');
      }
      r.players.forEach(function (p) {
        if (!p.you && !p.ready && Math.random() < .4) {
          p.ready = true;
          if (Math.random() < .35) pushChat(p, M.pick(['redo!', 'kör då', 'nu kör vi', 'klar 👍', 'jag är peppad']));
        }
      });
      if (Math.random() < .22) pushChat(M.pick(r.players.filter(function (p) { return !p.you; })), M.pick([
        'någon som är bra på bråk?', 'jag suger på division 😅', 'senast höll jag i bomben i 3 sek',
        'lycka till alla', 'vem vinner?', 'kasta inte till mig 🙏', 'hej!', 'gl hf',
        'jag tränade hela igår', 'extrem är omöjligt', 'sista gången kom jag tvåa'
      ]));
      if (ui.current === 'lobbies' && currentLobby) ui.renderRoom(true);
    }, 2600);
  }

  function pushChat(who, text) {
    if (!currentLobby || !text) return;
    currentLobby.chat.push({ who: who ? who.name : null, text: text, you: who && who.you });
    if (currentLobby.chat.length > 60) currentLobby.chat.shift();
  }

  ui.renderRoom = function (soft) {
    var r = currentLobby;
    if (!r) return ui.renderLobbies();
    var readyCount = r.players.filter(function (p) { return p.ready; }).length;
    var me = r.players[0];

    var html =
      '<div class="view-head"><h2>' + r.base.flag + ' ' + esc(r.base.name) + '</h2>' +
        '<p>Kod <b>' + r.code + '</b> · ' + M.MODES[r.base.mode].icon + ' ' + M.MODES[r.base.mode].name +
        ' · ' + M.DIFFS[r.base.diff - 1].name + ' · ' + M.catName(r.base.cat) + '</p></div>' +

      '<div class="card"><h3>👥 Spelare ' + r.players.length + '/' + r.base.max + '</h3>' +
        r.players.map(function (p) {
          return '<div class="player-row ' + (p.you ? 'you' : '') + '">' +
            '<span class="av">' + p.av + '</span>' +
            '<span class="nm">' + esc(p.name) + (p.host ? ' 👑' : '') + (p.you ? ' (du)' : '') + '</span>' +
            '<span class="st ' + (p.ready ? 'ready' : '') + '">' + (p.ready ? 'Redo' : 'Väntar…') + '</span></div>';
        }).join('') +
      '</div>' +

      '<div class="card"><h3>💬 Lobbychatt</h3>' +
        '<div class="chatbox" id="chatbox">' +
          r.chat.map(function (c) {
            return c.who
              ? '<div class="chat-msg"><b>' + esc(c.who) + ':</b> ' + esc(c.text) + '</div>'
              : '<div class="chat-msg sys">' + esc(c.text) + '</div>';
          }).join('') +
        '</div>' +
        '<div class="row" style="gap:8px">' +
          '<input type="text" id="chat-input" placeholder="Skriv något…" maxlength="80">' +
          '<button class="btn small" data-act="send">Skicka</button>' +
        '</div>' +
      '</div>' +

      '<div class="row" style="gap:8px">' +
        '<button class="btn ghost" data-act="leave">← Lämna</button>' +
        '<button class="btn ' + (me.ready ? 'ghost' : '') + '" data-act="ready">' + (me.ready ? '✓ Redo' : 'Bli redo') + '</button>' +
        '<button class="btn" style="flex:1" data-act="start" ' + (readyCount < 2 ? 'disabled' : '') + '>▶ Starta (' + readyCount + ' redo)</button>' +
      '</div>';

    var el = $('#view-lobbies');
    var input = soft ? $('#chat-input') : null;
    var keep = input ? input.value : '';
    el.innerHTML = html;
    if (keep) $('#chat-input').value = keep;
    var cb = $('#chatbox');
    if (cb) cb.scrollTop = cb.scrollHeight;

    $$('#view-lobbies [data-act]').forEach(function (b) {
      b.onclick = function () {
        var a = b.dataset.act;
        if (a === 'leave') { leaveRoom(); }
        if (a === 'ready') { me.ready = !me.ready; ui.renderRoom(); }
        if (a === 'send') sendChat();
        if (a === 'start') startFromRoom();
      };
    });
    var ci = $('#chat-input');
    if (ci) ci.onkeydown = function (e) { if (e.key === 'Enter') sendChat(); };
  };

  function sendChat() {
    var ci = $('#chat-input');
    if (!ci || !ci.value.trim()) return;
    pushChat(currentLobby.players[0], ci.value.trim().slice(0, 80));
    ci.value = '';
    M.bump('chatSent');
    M.save();
    ui.achToast(M.checkAchievements());
    ui.renderRoom();
    setTimeout(function () {
      var bots = currentLobby ? currentLobby.players.filter(function (p) { return !p.you; }) : [];
      if (bots.length && Math.random() < .6) {
        pushChat(M.pick(bots), M.pick(['haha', 'sant', 'kör vi snart?', '👍', 'jag är redo', 'okej!', 'nice']));
        if (ui.current === 'lobbies') ui.renderRoom();
      }
    }, 1200);
  }

  function leaveRoom() {
    clearInterval(roomTimer);
    currentLobby = null;
    ui.renderLobbies();
  }

  function startFromRoom() {
    var r = currentLobby;
    var bots = r.players.filter(function (p) { return !p.you && p.ready; });
    if (!bots.length) bots = r.players.filter(function (p) { return !p.you; }).slice(0, 1);
    clearInterval(roomTimer);
    M.game.start({
      mode: r.base.mode, diff: r.base.diff, cat: r.base.cat,
      bots: bots.length, botDefs: bots, lobbyName: r.base.name
    });
  }
  ui.leaveRoomSilently = function () { clearInterval(roomTimer); currentLobby = null; };

  function createLobbyDialog() {
    ui.modal(
      '<h3>➕ Skapa lobby</h3>' +
      '<label class="field"><span>Namn</span><input type="text" id="cl-name" value="' + esc(M.profile.name) + 's lobby" maxlength="24"></label>' +
      '<label class="field"><span>Spelläge</span><select id="cl-mode">' +
        ['potato', 'blitz', 'duel'].map(function (m) { return '<option value="' + m + '">' + M.MODES[m].icon + ' ' + M.MODES[m].name + '</option>'; }).join('') +
      '</select></label>' +
      '<label class="field"><span>Svårighet</span><select id="cl-diff">' +
        M.DIFFS.map(function (d) { return '<option value="' + d.id + '"' + (d.id === 2 ? ' selected' : '') + '>' + d.name + '</option>'; }).join('') +
      '</select></label>' +
      '<label class="field"><span>Kategori</span><select id="cl-cat"><option value="mix">🎲 Blandat</option>' +
        M.CATEGORIES.map(function (c) { return '<option value="' + c.id + '">' + c.icon + ' ' + c.name + '</option>'; }).join('') +
      '</select></label>' +
      '<label class="field"><span>Max antal spelare</span><select id="cl-max">' +
        [2, 3, 4, 5, 6, 8].map(function (n) { return '<option value="' + n + '"' + (n === 5 ? ' selected' : '') + '>' + n + '</option>'; }).join('') +
      '</select></label>' +
      '<div class="row" style="gap:8px"><button class="btn ghost" data-x="close">Avbryt</button>' +
      '<button class="btn" style="flex:1" data-x="make">Skapa</button></div>',
      function (box) {
        $$('[data-x]', box).forEach(function (b) {
          b.onclick = function () {
            if (b.dataset.x === 'close') return ui.closeModal();
            var mode = $('#cl-mode').value;
            var l = {
              id: 'own' + Date.now(), name: $('#cl-name').value.trim() || 'Min lobby', flag: '🏠',
              diff: +$('#cl-diff').value, cat: $('#cl-cat').value, mode: mode,
              max: mode === 'duel' ? 2 : +$('#cl-max').value, players: 0, code: makeCode(),
              host: M.profile.name, ping: 8, live: false
            };
            lobbies.unshift(l);
            ui.closeModal();
            enterRoom(l, true);
          };
        });
      }
    );
  }

  function codeDialog() {
    ui.modal(
      '<h3>🔑 Gå med via kod</h3><p class="sub">Skriv in en lobbykod från en kompis.</p>' +
      '<label class="field" style="margin-top:10px"><span>Kod</span><input type="text" id="jc" placeholder="T.ex. K4M9Z" maxlength="5"></label>' +
      '<div class="row" style="gap:8px"><button class="btn ghost" data-x="close">Avbryt</button>' +
      '<button class="btn" style="flex:1" data-x="join">Gå med</button></div>',
      function (box) {
        $$('[data-x]', box).forEach(function (b) {
          b.onclick = function () {
            if (b.dataset.x === 'close') return ui.closeModal();
            var code = ($('#jc').value || '').toUpperCase().trim();
            if (code.length < 3) return ui.toast('⚠️', 'Ogiltig kod');
            var found = null;
            lobbies.forEach(function (l) { if (l.code === code) found = l; });
            if (!found) {
              found = { id: 'code' + Date.now(), name: 'Lobby ' + code, flag: '🔑', diff: 2, cat: 'mix', mode: 'potato', max: 6, players: M.rnd(1, 3), code: code, host: M.pick(M.BOT_NAMES), ping: M.rnd(20, 70), live: false };
              lobbies.unshift(found);
            }
            ui.closeModal();
            enterRoom(found, false);
          };
        });
      }
    );
  }

  /* ---------- Spela --------------------------------------------------------- */

  ui.playCfg = { diff: 2, cat: 'mix', bots: 3 };

  ui.renderPlay = function () {
    var c = ui.playCfg;
    var modes = [
      { id: 'potato', lock: 0 },
      { id: 'blitz', lock: 0 },
      { id: 'survival', lock: 0 },
      { id: 'duel', lock: 0 },
      { id: 'practice', lock: 0 },
      { id: 'daily', lock: 0 }
    ];
    $('#view-play').innerHTML =
      '<div class="view-head"><h2>Spela</h2><p>Välj läge, svårighet och kategori.</p></div>' +
      '<div class="card"><h3>⚙️ Inställningar för matchen</h3>' +
        '<div class="sub" style="margin-bottom:6px">Svårighet</div>' +
        '<div class="seg" id="seg-diff">' + M.DIFFS.map(function (d) {
          return '<button data-d="' + d.id + '" class="' + (c.diff === d.id ? 'on' : '') + '">' + d.name + '</button>';
        }).join('') + '</div>' +
        '<div class="sub" style="margin:12px 0 6px">Antal motståndare</div>' +
        '<div class="seg" id="seg-bots">' + [1, 2, 3, 5, 7].map(function (n) {
          return '<button data-b="' + n + '" class="' + (c.bots === n ? 'on' : '') + '">' + n + '</button>';
        }).join('') + '</div>' +
        '<label class="field" style="margin-top:12px"><span>Kategori</span><select id="sel-cat">' +
          '<option value="mix">🎲 Blandat</option>' +
          M.CATEGORIES.map(function (x) { return '<option value="' + x.id + '"' + (c.cat === x.id ? ' selected' : '') + '>' + x.icon + ' ' + x.name + '</option>'; }).join('') +
        '</select></label>' +
      '</div>' +
      modes.map(function (m) {
        var mm = M.MODES[m.id];
        return '<button class="mode-card" data-mode="' + m.id + '"><span class="ico">' + mm.icon + '</span>' +
          '<span><b>' + mm.name + '</b><small>' + mm.desc + '</small></span></button>';
      }).join('');

    $$('#seg-diff button').forEach(function (b) {
      b.onclick = function () { c.diff = +b.dataset.d; ui.renderPlay(); };
    });
    $$('#seg-bots button').forEach(function (b) {
      b.onclick = function () { c.bots = +b.dataset.b; ui.renderPlay(); };
    });
    $('#sel-cat').onchange = function () { c.cat = this.value; };
    $$('#view-play [data-mode]').forEach(function (b) {
      b.onclick = function () {
        var mode = b.dataset.mode;
        M.game.start({
          mode: mode, diff: c.diff, cat: c.cat,
          bots: mode === 'duel' ? 1 : (mode === 'survival' || mode === 'practice' || mode === 'daily' ? 0 : c.bots),
          lobbyName: M.MODES[mode].name
        });
      };
    });
  };

  /* ---------- Prestationer --------------------------------------------------- */

  ui.achFilter = 'alla';

  ui.renderAch = function () {
    var f = ui.achFilter;
    var list = M.ACHIEVEMENTS.filter(function (a) { return f === 'alla' || a.g === f; });
    var done = M.unlockedCount();
    var pct = Math.round(done / M.ACHIEVEMENTS.length * 100);

    $('#view-ach').innerHTML =
      '<div class="view-head"><h2>Prestationer</h2><p>' + done + ' av ' + M.ACHIEVEMENTS.length + ' upplåsta · ' + M.achPoints() + ' poäng</p></div>' +
      '<div class="card"><div class="row between"><b>Total framgång</b><span class="sub">' + pct + '%</span></div>' +
        '<div class="xpbar" style="margin-top:8px"><i style="width:' + pct + '%"></i></div></div>' +
      '<div class="ach-filter">' + M.ACH_GROUPS.map(function (g) {
        return '<button data-g="' + g.id + '" class="' + (f === g.id ? 'on' : '') + '">' + g.name + '</button>';
      }).join('') + '</div>' +
      list.map(achRow).join('');

    $$('#view-ach [data-g]').forEach(function (b) {
      b.onclick = function () { ui.achFilter = b.dataset.g; ui.renderAch(); };
    });
  };

  function achRow(a) {
    var p = M.achProgress(a);
    var hidden = a.secret && !p.done;
    return '<div class="ach ' + (p.done ? 'done' : 'locked') + '">' +
      '<span class="ico">' + (hidden ? '❔' : a.i) + '</span>' +
      '<div class="body"><b>' + (hidden ? 'Hemlig prestation' : esc(a.n)) +
        '<span class="rar ' + a.r + '">' + a.r + '</span>' + (p.done ? ' ✓' : '') + '</b>' +
        '<p>' + (hidden ? 'Lås upp den för att se vad den kräver.' : esc(a.d)) + '</p>' +
        '<div class="prog"><i style="width:' + (p.done ? 100 : p.pct) + '%"></i></div>' +
        '<div class="pnum">' + (p.done ? 'Klar · +' + a.c + ' mynt' : p.value + ' / ' + p.goal + ' · ' + a.c + ' mynt') + '</div>' +
      '</div></div>';
  }

  /* ---------- Profil, butik, topplista, inställningar ------------------------ */

  ui.profileTab = 'stats';

  ui.renderProfile = function () {
    var p = M.profile, s = p.stats;
    var tab = ui.profileTab;

    var head =
      '<div class="card"><div class="row">' +
        '<span style="font-size:40px">' + p.avatar + '</span>' +
        '<div style="flex:1;min-width:0"><b style="font-size:17px">' + esc(p.name) + '</b>' +
        '<div class="sub">Nivå ' + p.level + ' · ' + M.unlockedCount() + ' prestationer · 🪙 ' + p.coins + '</div></div>' +
        '<button class="btn ghost small" data-act="edit">Ändra</button>' +
      '</div></div>' +
      '<div class="seg" style="margin-bottom:12px">' +
        [['stats', '📊 Statistik'], ['shop', '🛒 Butik'], ['lb', '🏅 Topplista'], ['set', '⚙️ Inställningar']].map(function (t) {
          return '<button data-t="' + t[0] + '" class="' + (tab === t[0] ? 'on' : '') + '">' + t[1] + '</button>';
        }).join('') +
      '</div>';

    var body = '';

    if (tab === 'stats') {
      body =
        '<div class="grid grid-3">' +
          tile(s.gamesPlayed, 'Matcher') + tile(s.wins, 'Segrar') +
          tile((s.gamesPlayed ? Math.round(s.wins / s.gamesPlayed * 100) : 0) + '%', 'Vinstandel') +
          tile(s.correct, 'Rätt') + tile(s.wrong, 'Fel') + tile(M.accuracy() + '%', 'Träffsäkerhet') +
          tile(s.bestStreak, 'Bästa svit') + tile(s.throws, 'Kast') + tile(s.booms, 'Smällar') +
          tile(s.blitzBest, 'Blixtrekord') + tile(s.survivalBest, 'Överlevnad') + tile(Math.floor(s.secondsPlayed / 60) + 'm', 'Speltid') +
        '</div>' +
        '<div class="card mt"><h3>📚 Rätt per kategori</h3>' +
          M.CATEGORIES.map(function (c) {
            var v = s['cat_' + c.id] || 0;
            var max = Math.max(10, Math.max.apply(null, M.CATEGORIES.map(function (x) { return s['cat_' + x.id] || 0; })));
            return '<div style="margin-bottom:8px"><div class="row between" style="font-size:12.5px">' +
              '<span>' + c.icon + ' ' + c.name + '</span><b>' + v + '</b></div>' +
              '<div class="prog" style="height:6px;border-radius:99px;background:var(--bg-2);overflow:hidden;margin-top:3px">' +
              '<i style="display:block;height:100%;width:' + Math.round(v / max * 100) + '%;background:linear-gradient(90deg,var(--brand),var(--brand-2))"></i></div></div>';
          }).join('') +
        '</div>';
    }

    if (tab === 'shop') {
      body = '<div class="card"><div class="row between"><b>Dina mynt</b><b style="color:var(--warn)">🪙 ' + p.coins + '</b></div>' +
        '<p class="sub" style="margin-top:4px">Tjäna mynt genom att vinna matcher och låsa upp prestationer.</p></div>' +
        ['avatar', 'theme', 'bomb'].map(function (type) {
          var title = type === 'avatar' ? '🙂 Avatarer' : type === 'theme' ? '🎨 Teman' : '💣 Bombskinn';
          return '<div class="card"><h3>' + title + '</h3>' +
            M.SHOP.filter(function (i) { return i.type === type; }).map(shopRow).join('') + '</div>';
        }).join('');
    }

    if (tab === 'lb') {
      body = '<div class="card"><h3>🏅 Topplista — den här veckan</h3>' + leaderboardHtml() + '</div>';
    }

    if (tab === 'set') {
      body =
        '<div class="card"><h3>⚙️ Inställningar</h3>' +
          toggleRow('sound', '🔊 Ljudeffekter') +
          toggleRow('vibrate', '📳 Vibration') +
          toggleRow('anim', '✨ Animationer') +
        '</div>' +
        '<div class="card"><h3>🎨 Tema</h3><div class="grid grid-3">' +
          [{ id: 'default', name: 'Mattenite', icon: '🟣' }].concat(
            M.SHOP.filter(function (i) { return i.type === 'theme'; }).map(function (i) { return { id: i.theme, name: i.name, icon: i.icon, req: i.id }; })
          ).map(function (t) {
            var owned = !t.req || M.owns(t.req);
            return '<button class="btn ' + (p.theme === t.id ? '' : 'ghost') + ' small" data-theme="' + t.id + '" ' + (owned ? '' : 'disabled') + '>' +
              t.icon + ' ' + t.name + '</button>';
          }).join('') +
        '</div></div>' +
        '<div class="card"><h3>ℹ️ Om Mattenite</h3><p class="sub">Version 1.0.0 · byggd med Apache Cordova.<br>' +
          'Spelet fungerar helt offline och all data sparas lokalt på din enhet.</p>' +
          '<button class="btn danger block mt" data-act="reset">Nollställ all data</button></div>';
    }

    $('#view-profile').innerHTML = head + body;

    $$('#view-profile [data-t]').forEach(function (b) {
      b.onclick = function () { ui.profileTab = b.dataset.t; ui.renderProfile(); };
    });
    $$('#view-profile [data-buy]').forEach(function (b) {
      b.onclick = function () { buyItem(b.dataset.buy); };
    });
    $$('#view-profile [data-use]').forEach(function (b) {
      b.onclick = function () { useItem(b.dataset.use); };
    });
    $$('#view-profile [data-theme]').forEach(function (b) {
      b.onclick = function () { p.theme = b.dataset.theme; M.save(); ui.refreshChips(); ui.renderProfile(); };
    });
    $$('#view-profile [data-toggle]').forEach(function (b) {
      b.onclick = function () {
        p.settings[b.dataset.toggle] = !p.settings[b.dataset.toggle];
        M.save(); ui.refreshChips(); ui.renderProfile();
      };
    });
    $$('#view-profile [data-act]').forEach(function (b) {
      b.onclick = function () {
        if (b.dataset.act === 'edit') editProfileDialog();
        if (b.dataset.act === 'reset') {
          ui.modal('<h3>⚠️ Nollställ allt?</h3><p class="sub">All statistik, mynt och prestationer försvinner. Det går inte att ångra.</p>' +
            '<div class="row mt" style="gap:8px"><button class="btn ghost" data-x="close">Avbryt</button>' +
            '<button class="btn danger" style="flex:1" data-x="yes">Ja, nollställ</button></div>', function (box) {
              $$('[data-x]', box).forEach(function (bb) {
                bb.onclick = function () {
                  if (bb.dataset.x === 'yes') { M.reset(); ui.toast('🧹', 'Allt nollställt'); }
                  ui.closeModal(); ui.renderProfile(); ui.refreshChips();
                };
              });
            });
        }
      };
    });
  };

  function toggleRow(key, label) {
    var on = M.profile.settings[key];
    return '<div class="row between" style="padding:9px 0;border-bottom:1px solid var(--border)">' +
      '<span style="font-size:14px">' + label + '</span>' +
      '<button class="btn ' + (on ? '' : 'ghost') + ' small" data-toggle="' + key + '">' + (on ? 'På' : 'Av') + '</button></div>';
  }

  function shopRow(item) {
    var owned = M.owns(item.id) || item.cost === 0;
    var inUse = (item.type === 'avatar' && M.profile.avatar === item.icon) ||
                (item.type === 'theme' && M.profile.theme === item.theme) ||
                (item.type === 'bomb' && M.profile.bomb === item.icon);
    return '<div class="shop-item"><span class="ico">' + item.icon + '</span>' +
      '<div class="body"><b>' + esc(item.name) + '</b><small>' + (owned ? 'Ägs' : item.cost + ' mynt') + '</small></div>' +
      (owned
        ? (inUse ? '<span class="pill live">✓ används</span>' : '<button class="btn ghost small" data-use="' + item.id + '">Använd</button>')
        : '<button class="btn small" data-buy="' + item.id + '" ' + (M.profile.coins < item.cost ? 'disabled' : '') + '>Köp</button>') +
    '</div>';
  }

  function buyItem(id) {
    if (M.buy(id)) {
      ui.sfx.coin();
      var it = M.SHOP.filter(function (x) { return x.id === id; })[0];
      ui.toast('🛒', 'Köpt: ' + it.name, 'Tryck "Använd" för att ta på dig den.');
      ui.achToast(M.checkAchievements());
      useItem(id);
    } else {
      ui.toast('🪙', 'Inte råd', 'Vinn fler matcher för att tjäna mynt.');
    }
  }

  function useItem(id) {
    var it = M.SHOP.filter(function (x) { return x.id === id; })[0];
    if (!it) return;
    if (it.type === 'avatar') M.profile.avatar = it.icon;
    if (it.type === 'theme') M.profile.theme = it.theme;
    if (it.type === 'bomb') M.profile.bomb = it.icon;
    M.save();
    ui.refreshChips();
    ui.renderProfile();
  }

  function editProfileDialog() {
    ui.modal(
      '<h3>✏️ Din profil</h3>' +
      '<label class="field"><span>Namn</span><input type="text" id="pf-name" maxlength="14" value="' + esc(M.profile.name) + '"></label>' +
      '<div class="sub" style="margin-bottom:6px">Avatar</div>' +
      '<div class="grid grid-4" id="pf-avs">' +
        M.AVATARS.map(function (a) {
          var locked = M.SHOP.some(function (s) { return s.type === 'avatar' && s.icon === a && !M.owns(s.id); });
          return '<button class="btn ghost" data-av="' + a + '" ' + (locked ? 'disabled' : '') + ' style="font-size:22px;padding:10px 0">' + a + (locked ? '🔒' : '') + '</button>';
        }).join('') +
      '</div>' +
      '<div class="row mt" style="gap:8px"><button class="btn ghost" data-x="close">Avbryt</button>' +
      '<button class="btn" style="flex:1" data-x="save">Spara</button></div>',
      function (box) {
        var chosen = M.profile.avatar;
        $$('[data-av]', box).forEach(function (b) {
          b.onclick = function () {
            chosen = b.dataset.av;
            $$('[data-av]', box).forEach(function (x) { x.classList.add('ghost'); });
            b.classList.remove('ghost');
          };
        });
        $$('[data-x]', box).forEach(function (b) {
          b.onclick = function () {
            if (b.dataset.x === 'save') {
              M.profile.name = ($('#pf-name').value || 'Du').trim().slice(0, 14) || 'Du';
              M.profile.avatar = chosen;
              M.save();
            }
            ui.closeModal();
            ui.renderProfile();
          };
        });
      }
    );
  }

  function leaderboardHtml() {
    var rnd = M.seededRandom('lb-' + M.todayKey().slice(0, 7) + '-' + Math.floor(new Date().getDate() / 7));
    var base = 400 + M.profile.level * 90;
    var rows = M.BOT_NAMES.slice(0, 12).map(function (n) {
      return { name: n, av: M.AVATARS[Math.floor(rnd() * M.AVATARS.length)], score: Math.round(base * (0.35 + rnd() * 1.5)) };
    });
    var mine = M.profile.stats.correct * 3 + M.profile.stats.wins * 40 + M.achPoints() * 2;
    rows.push({ name: M.profile.name, av: M.profile.avatar, score: mine, you: true });
    rows.sort(function (a, b) { return b.score - a.score; });
    return rows.slice(0, 13).map(function (r, i) {
      var medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      return '<div class="lb-row ' + (r.you ? 'you' : '') + '"><span class="pos">' + medal + '</span>' +
        '<span style="font-size:20px">' + r.av + '</span><span>' + esc(r.name) + (r.you ? ' (du)' : '') + '</span>' +
        '<span class="sc">' + r.score + '</span></div>';
    }).join('');
  }

})(window.MATTENITE = window.MATTENITE || {});

</script>
<script>
/* ==========================================================================
   game.js — spelmotorn: het bomb, blixt, överlevnad, duell, träning, dagens
   ========================================================================== */
(function (M) {
  'use strict';

  var ui = M.ui;
  var $ = ui.$, $$ = ui.$$, esc = ui.esc;

  var G = {
    running: false,
    cfg: null,
    players: [],
    holder: 0,
    q: null,
    phase: 'idle',     // 'answer' | 'throw' | 'wait' | 'over'
    time: 0,           // sekunder kvar
    maxTime: 0,
    round: 1,
    feed: [],
    pw: [],            // dina power-ups
    armed: null,       // förvald power-up
    frozenUntil: 0,
    m: null,           // matchstatistik
    tickId: null,
    botAt: 0,
    qShownAt: 0,
    dailyQs: null
  };
  M.game = G;

  var LIVES = 3;

  /* ---------- Start --------------------------------------------------------- */

  G.start = function (cfg) {
    G.cfg = cfg;
    G.running = true;
    G.round = 1;
    G.feed = [];
    G.pw = [];
    G.armed = null;
    G.frozenUntil = 0;
    G.dailyQs = null;
    G.m = {
      correct: 0, wrong: 0, streak: 0, best: 0, throws: 0, booms: 0, kos: 0,
      pwUsed: 0, score: 0, xp: 0, startedAt: Date.now(), targets: {}, x2: false
    };

    var you = {
      id: 'you', name: M.profile.name, av: M.profile.avatar, you: true,
      lives: LIVES, alive: true, skill: 1, shield: false, score: 0
    };
    G.players = [you];

    var defs = cfg.botDefs || [];
    var n = cfg.bots || 0;
    var freeAvatars = M.shuffle(M.AVATARS.filter(function (a) { return a !== M.profile.avatar; }));
    for (var i = 0; i < n; i++) {
      var d = defs[i];
      G.players.push({
        id: 'b' + i,
        name: d ? d.name : M.BOT_NAMES[(i * 7 + M.rnd(0, 20)) % M.BOT_NAMES.length],
        av: (d && d.av !== M.profile.avatar) ? d.av : (freeAvatars[i % freeAvatars.length] || M.pick(M.AVATARS)),
        you: false, lives: LIVES, alive: true,
        skill: d ? d.skill : (0.5 + Math.random() * 0.45),
        shield: false, score: 0
      });
    }
    // Unika namn
    var seen = {};
    G.players.forEach(function (p, idx) {
      while (seen[p.name]) p.name = p.name + ' ' + (idx + 1);
      seen[p.name] = 1;
    });

    var hour = new Date().getHours();
    if (hour < 5) M.bump('nightGames');
    else if (hour < 7) M.bump('morningGames');

    if (cfg.mode === 'daily') buildDaily();

    G.maxTime = roundTime();
    G.time = G.maxTime;
    G.holder = cfg.mode === 'potato' || cfg.mode === 'duel' ? M.rnd(0, G.players.length - 1) : 0;

    feed(cfg.mode === 'potato' || cfg.mode === 'duel'
      ? '💣 ' + G.players[G.holder].name + ' börjar med bomben!'
      : M.MODES[cfg.mode].icon + ' ' + M.MODES[cfg.mode].name + ' startar!');

    ui.show('game');
    nextQuestion();
    startTick();
    ui.sfx.throwIt();
  };

  function buildDaily() {
    var rng = M.seededRandom('mattenite-' + M.todayKey());
    var realRandom = Math.random;
    Math.random = rng;
    try {
      G.dailyQs = [];
      for (var i = 0; i < 10; i++) G.dailyQs.push(M.question('mix', 1 + (i % 4)));
    } finally {
      Math.random = realRandom;
    }
  }

  function roundTime() {
    var base = M.DIFFS[(G.cfg.diff || 2) - 1].time;
    switch (G.cfg.mode) {
      case 'potato':
      case 'duel':
        return Math.max(6, base - (G.round - 1) * 1.2);
      case 'survival':
        return Math.max(4, base - G.m.score * 0.35);
      case 'blitz':
        return 60;
      case 'daily':
        return 20;
      default:
        return 0; // träning = ingen klocka
    }
  }

  function isPotato() { return G.cfg.mode === 'potato' || G.cfg.mode === 'duel'; }
  function alive() { return G.players.filter(function (p) { return p.alive; }); }
  function you() { return G.players[0]; }

  function feed(txt) {
    G.feed.unshift(txt);
    if (G.feed.length > 30) G.feed.pop();
  }

  /* ---------- Frågeflöde ----------------------------------------------------- */

  function nextQuestion() {
    if (G.cfg.mode === 'daily') {
      G.q = G.dailyQs[Math.min(G.m.correct + G.m.wrong, 9)];
    } else {
      var d = G.cfg.diff;
      if (G.cfg.mode === 'survival') d = Math.min(4, G.cfg.diff + Math.floor(G.m.score / 8));
      G.q = M.question(G.cfg.cat, d);
    }
    G.qShownAt = Date.now();
    G.phase = (isPotato() && !G.players[G.holder].you) ? 'wait' : 'answer';
    if (isPotato() && !G.players[G.holder].you) scheduleBot();
    render();
  }

  function scheduleBot() {
    var b = G.players[G.holder];
    var base = 1400 + (1 - b.skill) * 2600;
    G.botAt = Date.now() + base * (0.7 + Math.random() * 0.7);
  }

  function botTurn() {
    var b = G.players[G.holder];
    var ok = Math.random() < (b.skill - (G.cfg.diff - 2) * 0.06);
    if (!ok) {
      feed('❌ ' + b.name + ' svarade fel (−2 s)');
      G.time = Math.max(0.4, G.time - 2);
      scheduleBot();
      render();
      return;
    }
    // Boten kastar till någon annan — helst den med flest liv
    var others = alive().filter(function (p) { return p !== b; });
    if (!others.length) return;
    others.sort(function (x, y) { return y.lives - x.lives; });
    var target = Math.random() < 0.55 ? others[0] : M.pick(others);
    throwBomb(b, target);
  }

  function throwBomb(from, to) {
    if (to.shield) {
      to.shield = false;
      M.bump('shieldBlocks');
      feed('🛡️ ' + to.name + ' studsade tillbaka bomben till ' + from.name + '!');
      ui.sfx.throwIt();
      G.holder = G.players.indexOf(from);
    } else {
      G.holder = G.players.indexOf(to);
      feed('💣 ' + from.name + ' → ' + to.name);
      ui.sfx.throwIt();
    }
    G.lastThrower = from;
    nextQuestion();
  }

  /* ---------- Ditt svar ------------------------------------------------------- */

  G.answer = function (idx) {
    if (G.phase !== 'answer' || !G.q) return;
    var ms = Date.now() - G.qShownAt;
    var right = idx === G.q.correct;
    var btns = $$('#opts .opt');
    btns.forEach(function (b, i) {
      b.disabled = true;
      if (i === G.q.correct) b.classList.add('right');
      else if (i === idx) b.classList.add('wrong');
    });

    M.bump('answers');
    if (G.cfg.mode === 'practice') M.bump('practiceAnswers');

    if (right) {
      G.m.correct++;
      G.m.streak++;
      G.m.best = Math.max(G.m.best, G.m.streak);
      M.bump('correct');
      M.bump('cat_' + G.q.cat);
      M.setMax('bestStreak', G.m.streak);
      if (G.q.answer === 42) M.bump('answer42');
      if (ms < 3000) M.bump('fastAnswers3');
      if (ms < 1500) M.bump('fastAnswers15');
      ui.sfx.right();
      ui.buzz(20);
      grantPowerup();
      addXp(G.m.x2 ? 8 : 4);
    } else {
      G.m.wrong++;
      G.m.streak = 0;
      M.bump('wrong');
      ui.sfx.wrong();
      ui.buzz([40, 60, 40]);
    }

    setTimeout(function () { afterAnswer(right); }, right ? 260 : 520);
  };

  function afterAnswer(right) {
    if (!G.running) return;

    if (isPotato()) {
      if (right) {
        G.phase = 'throw';
        render();
      } else {
        G.time = Math.max(0.4, G.time - 2);
        feed('❌ Fel — 2 sekunder brändes');
        nextQuestion();
      }
      return;
    }

    if (G.cfg.mode === 'blitz') {
      if (right) { G.m.score++; you().score = G.m.score; }
      nextQuestion();
      return;
    }

    if (G.cfg.mode === 'survival') {
      if (right) {
        G.m.score++;
        G.maxTime = roundTime();
        G.time = G.maxTime;
        nextQuestion();
      } else {
        loseLife(you(), 'fel svar');
        if (G.running) { G.maxTime = roundTime(); G.time = G.maxTime; nextQuestion(); }
      }
      return;
    }

    if (G.cfg.mode === 'daily') {
      if (right) G.m.score++;
      if (G.m.correct + G.m.wrong >= 10) return endGame();
      G.time = roundTime();
      nextQuestion();
      return;
    }

    // Träning
    if (right) G.m.score++;
    nextQuestion();
  }

  G.throwTo = function (id) {
    if (G.phase !== 'throw') return;
    var target = null;
    G.players.forEach(function (p) { if (p.id === id) target = p; });
    if (!target || !target.alive) return;

    G.m.throws++;
    G.m.targets[id] = (G.m.targets[id] || 0) + 1;
    M.bump('throws');
    if (G.time < 1) M.bump('clutchThrows');
    throwBomb(you(), target);
  };

  /* ---------- Power-ups -------------------------------------------------------- */

  function grantPowerup() {
    if (!isPotato() && G.cfg.mode !== 'survival') return;
    if (G.m.correct % 3 !== 0 || G.pw.length >= 3) return;
    var keys = Object.keys(M.POWERUPS);
    var k = M.pick(keys);
    G.pw.push(k);
    feed('🎁 Power-up: ' + M.POWERUPS[k].name);
  }

  G.usePowerup = function (i) {
    var k = G.pw[i];
    if (!k) return;
    var p = M.POWERUPS[k];

    if (k === 'swap' && G.players[G.holder] !== you()) {
      ui.toast('🔀', 'Du håller inte i bomben');
      return;
    }
    if (k === 'freeze' && !isPotato() && G.cfg.mode !== 'survival') return;

    G.pw.splice(i, 1);
    G.m.pwUsed++;
    M.bump('powerupsUsed');
    ui.buzz(25);

    if (k === 'freeze') { G.frozenUntil = Date.now() + 4000; feed('⏸️ Bomben frusen i 4 sekunder'); }
    if (k === 'skip') { feed('⏭️ Ny fråga'); nextQuestion(); }
    if (k === 'shield') { you().shield = true; feed('🛡️ Sköld aktiv'); }
    if (k === 'x2') { G.m.x2 = true; feed('💎 Dubbel XP resten av matchen'); }
    if (k === 'swap') {
      var others = alive().filter(function (p) { return !p.you; });
      if (others.length) { G.phase = 'throw'; feed('🔀 Kasta utan att svara!'); }
    }
    ui.toast(p.icon, p.name + ' använd', p.desc, 1800);
    render();
  };

  /* ---------- Klockan ---------------------------------------------------------- */

  function startTick() {
    clearInterval(G.tickId);
    var last = Date.now();
    G.tickId = setInterval(function () {
      var now = Date.now();
      var dt = (now - last) / 1000;
      last = now;
      if (!G.running) return;

      if (G.cfg.mode !== 'practice') {
        var frozen = now < G.frozenUntil;
        if (!frozen) G.time -= dt;
        if (G.time <= 3.2 && G.time > 0 && Math.floor(G.time * 2) !== Math.floor((G.time + dt) * 2)) ui.sfx.tick();
        if (G.time <= 0) { G.time = 0; timeUp(); }
      }

      if (isPotato() && G.phase === 'wait' && now >= G.botAt && G.running) botTurn();
      updateTimer();
    }, 100);
  }

  function timeUp() {
    if (isPotato()) {
      var h = G.players[G.holder];
      ui.sfx.boom();
      ui.buzz([80, 60, 120]);
      feed('💥 BOOM! ' + h.name + ' höll i bomben.');
      if (h.you) { G.m.booms++; M.bump('booms'); if (G.m.booms === 3) M.bump('tripleBoom'); }
      if (G.lastThrower && G.lastThrower.you && !h.you && h.lives === 1) { G.m.kos++; M.bump('knockouts'); }
      loseLife(h, 'bomben');
      if (!G.running) return;
      G.round++;
      G.maxTime = roundTime();
      G.time = G.maxTime;
      var live = alive();
      G.holder = G.players.indexOf(M.pick(live));
      G.lastThrower = null;
      feed('🔄 Runda ' + G.round + ' — ' + G.players[G.holder].name + ' får bomben');
      nextQuestion();
      return;
    }

    if (G.cfg.mode === 'blitz') return endGame();
    if (G.cfg.mode === 'survival') {
      loseLife(you(), 'tiden');
      if (G.running) { G.maxTime = roundTime(); G.time = G.maxTime; nextQuestion(); }
      return;
    }
    if (G.cfg.mode === 'daily') {
      G.m.wrong++;
      if (G.m.correct + G.m.wrong >= 10) return endGame();
      G.time = roundTime();
      nextQuestion();
    }
  }

  function loseLife(p, cause) {
    p.lives--;
    if (p.lives <= 0) {
      p.alive = false;
      feed('☠️ ' + p.name + ' är ute (' + cause + ')');
      if (p.you) ui.sfx.lose();
    }
    var live = alive();
    if (isPotato() && live.length <= 1) return endGame();
    if (!isPotato() && !you().alive) return endGame();
    render();
  }

  function updateTimer() {
    var bar = $('#tbar');
    if (!bar) return;
    var pct = G.maxTime ? Math.max(0, Math.min(100, G.time / G.maxTime * 100)) : 100;
    bar.style.width = pct + '%';
    bar.parentNode.classList.toggle('danger', G.time < G.maxTime * 0.3);
    var num = $('#tnum');
    if (num) num.textContent = G.cfg.mode === 'practice' ? '∞' : G.time.toFixed(1) + ' s';
  }

  /* ---------- Slut -------------------------------------------------------------- */

  G.abort = function () {
    G.running = false;
    clearInterval(G.tickId);
  };

  function endGame() {
    if (!G.running) return;
    G.running = false;
    G.phase = 'over';
    clearInterval(G.tickId);

    var s = M.profile.stats;
    var mode = G.cfg.mode;
    var win = false, title = '', sub = '', coins = 0, xp = 0;
    var secs = Math.round((Date.now() - G.m.startedAt) / 1000);
    M.bump('secondsPlayed', secs);

    if (isPotato()) {
      var live = alive();
      win = live.length === 1 && live[0].you;
      M.bump('gamesPlayed');
      if (win) {
        M.bump('wins');
        s.winStreak++;
        M.setMax('bestWinStreak', s.winStreak);
        if (G.m.wrong === 0) M.bump('perfectGames');
        if (you().lives === LIVES) M.bump('fullLifeWins');
        if (you().lives === 1) M.bump('comebacks');
        if (G.m.pwUsed === 0) M.bump('pureWins');
        if (G.cfg.diff === 3) M.bump('hardWins');
        if (G.cfg.diff === 4) M.bump('extremeWins');
        if (G.players.length >= 6) M.bump('bigLobbyWins');
        if (mode === 'duel') M.bump('duelWins');
        var tks = Object.keys(G.m.targets);
        if (tks.length === 1 && G.m.targets[tks[0]] >= 4) M.bump('pacifist');
        coins = 30 + G.players.length * 6 + G.cfg.diff * 8;
        xp = 60 + G.m.correct * 3;
        title = '🏆 Du vann!';
        sub = 'Sist kvar av ' + G.players.length + ' spelare.';
      } else {
        s.winStreak = 0;
        coins = 8 + G.m.correct;
        xp = 15 + G.m.correct * 2;
        var place = G.players.filter(function (p) { return p.alive; }).length + 1;
        title = '💥 Du åkte ut';
        sub = 'Du kom på plats ' + place + ' av ' + G.players.length + '.';
      }
    } else if (mode === 'blitz') {
      G.m.score = G.m.correct;
      you().score = G.m.score;
      M.bump('gamesPlayed');
      G.players.forEach(function (p) {
        if (!p.you) p.score = Math.round(G.m.score * (0.55 + p.skill * 0.85) * (0.8 + Math.random() * 0.5));
      });
      var sorted = G.players.slice().sort(function (a, b) { return b.score - a.score; });
      win = sorted[0].you;
      M.setMax('blitzBest', G.m.score);
      if (win) { M.bump('wins'); s.winStreak++; M.setMax('bestWinStreak', s.winStreak); } else s.winStreak = 0;
      coins = 10 + G.m.score * 2 + (win ? 25 : 0);
      xp = 20 + G.m.score * 3;
      title = win ? '⚡ Blixtseger!' : '⚡ Blixt klar';
      sub = G.m.score + ' rätt på 60 sekunder · plats ' + (sorted.indexOf(you()) + 1) + '/' + G.players.length;
    } else if (mode === 'survival') {
      M.bump('gamesPlayed');
      M.setMax('survivalBest', G.m.score);
      coins = 8 + G.m.score * 3;
      xp = 15 + G.m.score * 4;
      title = '🛡️ Överlevnad slut';
      sub = 'Du klarade ' + G.m.score + ' frågor.';
    } else if (mode === 'daily') {
      M.bump('gamesPlayed');
      var today = M.todayKey();
      if (M.profile.daily.date !== today) {
        var y = new Date(Date.now() - 864e5);
        var yKey = y.getFullYear() + '-' + ('0' + (y.getMonth() + 1)).slice(-2) + '-' + ('0' + y.getDate()).slice(-2);
        M.profile.daily.streak = (M.profile.daily.date === yKey) ? M.profile.daily.streak + 1 : 1;
        M.profile.daily.date = today;
        M.bump('dailyDone');
        M.setMax('bestDailyStreak', M.profile.daily.streak);
        if (G.m.score === 10) M.bump('dailyPerfect');
        coins = 25 + G.m.score * 5;
      } else {
        coins = G.m.score;
      }
      M.profile.daily.score = G.m.score;
      M.profile.daily.best = Math.max(M.profile.daily.best || 0, G.m.score);
      xp = 20 + G.m.score * 5;
      title = '📅 Dagens utmaning klar';
      sub = G.m.score + '/10 rätt · svit ' + M.profile.daily.streak + ' dagar';
    } else {
      coins = Math.floor(G.m.correct / 2);
      xp = G.m.correct * 2;
      title = '🎯 Träning avslutad';
      sub = G.m.correct + ' rätt, ' + G.m.wrong + ' fel.';
    }

    if (G.m.x2) xp *= 2;
    M.addCoins(coins, true);
    addXp(xp, true);
    M.pushHistory({ mode: mode, win: win, result: (win ? 'Vinst' : '') + (win ? ' · ' : '') + (G.m.correct + ' rätt') });
    M.save();

    var fresh = M.checkAchievements();
    if (win) { ui.sfx.win(); ui.confetti(90); }
    ui.refreshChips();
    renderOver(title, sub, coins, xp, fresh);
    if (fresh.length) setTimeout(function () { ui.achToast(fresh); }, 700);
  }

  function addXp(n) {
    var r = M.addXp(n);
    if (r.levels > 0) {
      ui.toast('⭐', 'Nivå ' + M.profile.level + '!', 'Du fick ' + (25 + M.profile.level * 5) + ' mynt.', 3000);
      ui.sfx.unlock();
      ui.confetti(40);
      ui.refreshChips();
    }
  }

  /* ---------- Rendering --------------------------------------------------------- */

  function render() {
    if (!$('#view-game')) return;
    var mode = G.cfg.mode;
    var holder = G.players[G.holder];
    var html = '';

    html += '<div class="game-top">' +
      '<button class="btn ghost small" id="g-quit">✕</button>' +
      '<div class="timer-wrap"><div class="timer-bar"><i id="tbar"></i></div>' +
      '<div class="timer-num"><span>' + M.MODES[mode].icon + ' ' + esc(G.cfg.lobbyName || M.MODES[mode].name) + '</span>' +
      '<span id="tnum">' + (mode === 'practice' ? '∞' : G.time.toFixed(1) + ' s') + '</span></div></div></div>';

    if (isPotato()) {
      html += '<div class="player-strip">' + G.players.map(function (p, i) {
        return '<div class="pstrip ' + (i === G.holder ? 'holding' : '') + ' ' + (p.alive ? '' : 'out') + '">' +
          (i === G.holder ? '<span class="bomb-tag">' + M.profile.bomb + '</span>' : '') +
          '<div class="av">' + p.av + '</div><div class="nm">' + esc(p.you ? 'Du' : p.name) + '</div>' +
          '<div class="hp">' + (p.alive ? '❤️'.repeat(Math.max(0, p.lives)) : '☠️') + '</div>' +
          (p.shield ? '<div class="hp">🛡️</div>' : '') + '</div>';
      }).join('') + '</div>';

      html += '<div class="holder-banner ' + (holder.you ? 'mine' : '') + '">' +
        '<span class="big">' + M.profile.bomb + '</span>' +
        (holder.you
          ? (G.phase === 'throw' ? 'Rätt svar! Kasta bomben vidare — fort!' : 'Du har bomben — svara snabbt!')
          : esc(holder.name) + ' har bomben…') + '</div>';
    }

    if (mode === 'blitz') {
      html += '<div class="row between" style="margin-bottom:10px"><b>⚡ Poäng: ' + G.m.score + '</b>' +
        '<span class="sub">Svit ' + G.m.streak + '</span></div>';
    }
    if (mode === 'survival') {
      html += '<div class="row between" style="margin-bottom:10px"><b>🛡️ ' + G.m.score + ' klarade</b>' +
        '<span>' + '❤️'.repeat(Math.max(0, you().lives)) + '</span></div>';
    }
    if (mode === 'daily') {
      html += '<div class="row between" style="margin-bottom:10px"><b>Fråga ' + Math.min(10, G.m.correct + G.m.wrong + 1) + '/10</b>' +
        '<span class="sub">' + G.m.score + ' rätt</span></div>';
    }
    if (mode === 'practice') {
      html += '<div class="row between" style="margin-bottom:10px"><b>🎯 ' + G.m.correct + ' rätt</b>' +
        '<span class="sub">' + G.m.wrong + ' fel · svit ' + G.m.streak + '</span></div>';
    }

    if (G.pw.length) {
      html += '<div class="pw-bar">' + G.pw.map(function (k, i) {
        var p = M.POWERUPS[k];
        return '<button class="pw" data-pw="' + i + '"><span class="ic">' + p.icon + '</span><span class="nm">' + p.name + '</span></button>';
      }).join('') + '</div>';
    }

    if (G.phase === 'throw') {
      html += '<div class="card"><h3>🤾 Kasta bomben till…</h3><div class="throw-grid">' +
        alive().filter(function (p) { return !p.you; }).map(function (p) {
          return '<button class="throw-btn ' + (p.shield ? 'shielded' : '') + '" data-throw="' + p.id + '">' +
            '<span class="av">' + p.av + '</span><span>' + esc(p.name) + '</span>' +
            '<span class="hearts">' + '❤️'.repeat(Math.max(0, p.lives)) + '</span></button>';
        }).join('') + '</div></div>';
    } else if (G.phase === 'wait') {
      html += '<div class="q-card"><div class="q-cat">' + M.catName(G.q.cat) + '</div>' +
        '<div class="q-text" style="opacity:.35">' + esc(G.q.text) + ' = ?</div>' +
        '<div class="q-streak">' + esc(holder.name) + ' funderar…</div></div>';
    } else if (G.q) {
      html += '<div class="q-card"><div class="q-cat">' + M.catName(G.q.cat) + ' · ' + M.DIFFS[G.q.diff - 1].name + '</div>' +
        '<div class="q-text">' + esc(G.q.text) + ' = ?</div>' +
        '<div class="q-streak">' + (G.m.streak >= 2 ? '🔥 ' + G.m.streak + ' i rad' : '') + '</div></div>' +
        '<div class="opts" id="opts">' + G.q.options.map(function (o, i) {
          return '<button class="opt" data-opt="' + i + '">' + esc(o) + '</button>';
        }).join('') + '</div>';
    }

    if (G.feed.length) {
      html += '<div class="feed">' + G.feed.slice(0, 6).map(function (f) { return '<div>' + esc(f) + '</div>'; }).join('') + '</div>';
    }

    if (mode === 'practice' || mode === 'blitz') {
      html += '<button class="btn ghost block" style="margin-top:12px" id="g-stop">Avsluta</button>';
    }

    $('#view-game').innerHTML = html;
    updateTimer();

    $$('#view-game [data-opt]').forEach(function (b) {
      b.onclick = function () { G.answer(+b.dataset.opt); };
    });
    $$('#view-game [data-throw]').forEach(function (b) {
      b.onclick = function () { G.throwTo(b.dataset.throw); };
    });
    $$('#view-game [data-pw]').forEach(function (b) {
      b.onclick = function () { G.usePowerup(+b.dataset.pw); };
    });
    var quit = $('#g-quit');
    if (quit) quit.onclick = function () { quitGame(); };
    var stop = $('#g-stop');
    if (stop) stop.onclick = function () { if (G.cfg.mode === 'blitz') { G.time = 0; timeUp(); } else endGame(); };
  }

  function quitGame() {
    ui.modal('<h3>Lämna matchen?</h3><p class="sub">Resultatet räknas inte.</p>' +
      '<div class="row mt" style="gap:8px"><button class="btn ghost" data-x="no">Fortsätt spela</button>' +
      '<button class="btn danger" style="flex:1" data-x="yes">Lämna</button></div>', function (box) {
        $$('[data-x]', box).forEach(function (b) {
          b.onclick = function () {
            ui.closeModal();
            if (b.dataset.x === 'yes') {
              G.abort();
              M.bump('secondsPlayed', Math.round((Date.now() - G.m.startedAt) / 1000));
              M.save();
              ui.show(M.ui.getLobby() ? 'lobbies' : 'home');
            }
          };
        });
      });
  }

  function renderOver(title, sub, coins, xp, fresh) {
    var mode = G.cfg.mode;
    var rows = '';
    if (isPotato()) {
      rows = G.players.slice().sort(function (a, b) { return (b.alive - a.alive) || (b.lives - a.lives); })
        .map(function (p, i) {
          return '<div class="lb-row ' + (p.you ? 'you' : '') + '"><span class="pos">' + (i + 1) + '</span>' +
            '<span style="font-size:19px">' + p.av + '</span><span>' + esc(p.you ? 'Du' : p.name) + '</span>' +
            '<span class="sc">' + (p.alive ? '❤️'.repeat(Math.max(0, p.lives)) : '☠️') + '</span></div>';
        }).join('');
    } else if (mode === 'blitz') {
      rows = G.players.slice().sort(function (a, b) { return b.score - a.score; }).map(function (p, i) {
        return '<div class="lb-row ' + (p.you ? 'you' : '') + '"><span class="pos">' + (i + 1) + '</span>' +
          '<span style="font-size:19px">' + p.av + '</span><span>' + esc(p.you ? 'Du' : p.name) + '</span>' +
          '<span class="sc">' + p.score + '</span></div>';
      }).join('');
    }

    $('#view-game').innerHTML =
      '<div class="card center" style="padding:26px 18px">' +
        '<div style="font-size:46px">' + title.split(' ')[0] + '</div>' +
        '<h2 style="font-size:22px;margin:6px 0 4px">' + esc(title.replace(/^\S+\s/, '')) + '</h2>' +
        '<p class="sub">' + esc(sub) + '</p>' +
        '<div class="grid grid-3 mt">' +
          '<div class="stat-tile"><div class="num">' + G.m.correct + '</div><div class="lbl">Rätt</div></div>' +
          '<div class="stat-tile"><div class="num">' + G.m.best + '</div><div class="lbl">Bästa svit</div></div>' +
          '<div class="stat-tile"><div class="num">' + G.m.throws + '</div><div class="lbl">Kast</div></div>' +
        '</div>' +
        '<div class="row mt" style="justify-content:center;gap:14px;font-weight:800">' +
          '<span style="color:var(--warn)">🪙 +' + coins + '</span><span style="color:var(--brand-2)">✨ +' + xp + ' XP</span>' +
        '</div>' +
        (fresh.length ? '<p class="sub mt">🏅 ' + fresh.length + ' ny' + (fresh.length > 1 ? 'a' : '') + ' prestation' + (fresh.length > 1 ? 'er' : '') + '!</p>' : '') +
      '</div>' +
      (rows ? '<div class="card"><h3>📋 Slutställning</h3>' + rows + '</div>' : '') +
      '<div class="row" style="gap:8px">' +
        '<button class="btn ghost" data-end="home">🏠 Hem</button>' +
        '<button class="btn" style="flex:1" data-end="again">🔁 Spela igen</button>' +
      '</div>';

    $$('#view-game [data-end]').forEach(function (b) {
      b.onclick = function () {
        if (b.dataset.end === 'again') G.start(G.cfg);
        else { ui.leaveRoomSilently(); ui.show('home'); }
      };
    });
  }

  G.render = render;

})(window.MATTENITE = window.MATTENITE || {});

</script>
<script>
/* ==========================================================================
   app.js — start, Cordova-koppling, hårdvaruknappar
   ========================================================================== */
(function (M) {
  'use strict';

  function boot() {
    M.load();
    M.ui.refreshChips();
    M.ui.show('home');

    // Nya prestationer kan ha tillkommit sedan förra versionen
    var fresh = M.checkAchievements();
    if (fresh.length) setTimeout(function () { M.ui.achToast(fresh); }, 800);

    // Tabbar
    M.ui.$$('.tabbar button').forEach(function (b) {
      b.onclick = function () { M.ui.show(b.dataset.tab); };
    });

    // Stäng modal när man klickar utanför
    M.ui.$('#modal').onclick = function (e) {
      if (e.target.id === 'modal') M.ui.closeModal();
    };

    // Spara när appen går i bakgrunden
    document.addEventListener('pause', M.save, false);
    window.addEventListener('beforeunload', M.save);

    // Android-bakåtknapp
    document.addEventListener('backbutton', function () {
      if (M.ui.$('#modal').classList.contains('open')) return M.ui.closeModal();
      if (M.game.running) return M.ui.show('home');
      if (M.ui.current !== 'home') return M.ui.show('home');
      if (navigator.app && navigator.app.exitApp) navigator.app.exitApp();
    }, false);

    // Tangentbord: 1-4 svarar, Esc stänger modal
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') return M.ui.closeModal();
      if (M.game.running && M.game.phase === 'answer' && /^[1-4]$/.test(e.key)) {
        M.game.answer(parseInt(e.key, 10) - 1);
      }
    });
  }

  // Spelet behöver inga Cordova-plugin, så vi startar direkt och låter
  // cordova.js ladda i bakgrunden för bakåtknappen och pause-händelsen.
  if (window.location.protocol === 'file:' && !window.cordova) {
    var s = document.createElement('script');
    s.src = 'cordova.js';
    s.onerror = function () { /* körs utanför Cordova — spelet fungerar ändå */ };
    document.head.appendChild(s);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();

})(window.MATTENITE = window.MATTENITE || {});

</script>
</body>
</html>
