name: Bygg Mattenite APK

on:
  push:
    paths:
      - 'mattenite/**'
      - '.github/workflows/mattenite-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mattenite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Installera Android-paket
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Installera beroenden
        run: npm install --no-audit --no-fund

      - name: Bygg enfilsversionen
        run: npm run bundle

      - name: Lägg till Android-plattformen
        run: npx cordova platform add android@13.0.0

      - name: Bygg APK (debug)
        run: npx cordova build android

      - name: Döp om APK:n
        run: |
          mkdir -p out
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk \
             out/Mattenite-$(node -p "require('./package.json').version")-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: mattenite-apk
          path: mattenite/out/*.apk
          if-no-files-found: error
